<!DOCTYPE html>
<html>
<head>
<title>Shloka Finder</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.tab {
    display: inline-block;
    padding: 10px 20px;
    background: lightgray;
    cursor: pointer;
    margin: 5px;
}

.active {
    background: skyblue;
}

.container {
    display: none;
    margin-top: 20px;
}

input {
    padding: 10px;
    width: 320px;
    font-size: 16px;
}

#result {
    margin-top: 20px;
    white-space: pre-wrap;
    font-size: 18px;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<h2>Bhagavad Gita Full Shloka Finder</h2>

<div>
    <div class="tab active" onclick="openTab(event, 'english')">English</div>
    <div class="tab" onclick="openTab(event, 'telugu')">Telugu</div>
</div>

<div id="english" class="container" style="display:block;">
    <h3>English Shloka Search</h3>
    <input
        type="text"
        placeholder="Type first word..."
        onkeyup="searchShloka(this.value, 'english')"
    >
</div>

<div id="telugu" class="container">
    <h3>Telugu Shloka Search</h3>
    <input
        type="text"
        placeholder="మొదటి పదం టైప్ చేయండి..."
        onkeyup="searchShloka(this.value, 'telugu')"
    >
</div>

<div id="result"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

let englishShlokas = [];
let teluguShlokas = [];

async function loadPDF(file, lang) {

    const response = await fetch(file);
    const buffer = await response.arrayBuffer();

    const pdf = await pdfjsLib.getDocument(buffer).promise;

    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {

        let page = await pdf.getPage(i);
        let content = await page.getTextContent();
        let strings = content.items.map(item => item.str);

        text += strings.join(" ") + "\n";
    }

    let lines = text.split("\n");

    let shlokas = [];
    let current = "";

    for (let line of lines) {

        if (line.trim() === "") {

            if (current.trim() !== "") {
                shlokas.push(current.trim());
                current = "";
            }

        } else {

            current += line + " ";

        }

    }

    if (current.trim() !== "") {
        shlokas.push(current.trim());
    }

    if (lang === "english")
        englishShlokas = shlokas;

    else
        teluguShlokas = shlokas;
}

function searchShloka(word, lang) {

    if (!word) {
        document.getElementById("result").innerText = "";
        return;
    }

    let list =
        lang === "english"
        ? englishShlokas
        : teluguShlokas;

    word = word.toLowerCase();

    for (let shloka of list) {

        let firstWord = shloka
            .split(" ")[0]
            .toLowerCase();

        if (firstWord.startsWith(word)) {

            document.getElementById("result").innerText = shloka;

            return;
        }

    }

    document.getElementById("result").innerText = "Full shloka not found";
}

function openTab(event, name) {

    document
        .querySelectorAll(".container")
        .forEach(c => c.style.display = "none");

    document
        .querySelectorAll(".tab")
        .forEach(t => t.classList.remove("active"));

    document.getElementById(name).style.display = "block";

    event.target.classList.add("active");
}

loadPDF("BG-English.pdf", "english");
loadPDF("BG-Telugu.pdf", "telugu");

</script>

</body>
</html>
